name: Deploy to Cloudflare

# The live site is a Cloudflare Worker that serves the prebuilt Vite SPA
# (dist/) plus the /api/* routes. Nothing deploys automatically without this
# workflow, so merges to main never reached production. This builds the site
# and runs `wrangler deploy` on every push to main (and on demand).
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - a freshly rotated token with Workers Scripts: Edit
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
